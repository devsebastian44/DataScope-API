[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn -k uvicorn.workers.UvicornWorker app.main:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
PYTHON_VERSION = "3.11"
PORT = "8000"

[[services]]
name = "eda-api"

[services.variables]
API_V1_PREFIX = "/api/v1"
MAX_FILE_SIZE = "52428800"
ALLOWED_ORIGINS = "*"
PLOT_DPI = "100"

[volumes]
uploads = "/app/uploads"
outputs = "/app/outputs"
