image: python:3.13-slim

stages:
  - lint
  - test
  - security

variables:
  PYTHONPATH: "src"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python --version
  - pip install -r requirements.txt

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check src/app

test:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest tests/ --cov=src/app --cov-report=term

security_scan:
  stage: security
  script:
    - pip install --upgrade pip wheel
    - pip install bandit safety
    - bandit -r src/app
    - safety check
  allow_failure: true
