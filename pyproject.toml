[tool.pytest.ini_options]
minversion = "7.0"
addopts = "--cov=app --cov-report=term"
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4"]
ignore = ["B008"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv", ".git"]
skips = ["B101"]
